name: Build and Test APK

  workflow_dispatch:
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Executar testes a cada 10 minutos
    - cron: '*/10 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: InputBridge-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  # Job de teste simulado (sem dispositivo físico)
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: InputBridge-APK
          path: app/build/outputs/apk/debug/

      - name: Check APK exists
        run: |
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ APK encontrado e construído com sucesso"
            ls -la app/build/outputs/apk/debug/
          else
            echo "❌ APK não encontrado"
            exit 1
          fi

      - name: Validate APK structure
        run: |
          if command -v aapt2 &> /dev/null; then
            aapt2 dump badging app/build/outputs/apk/debug/app-debug.apk
          else
            echo "aapt2 não disponível, usando aapt"
            if command -v aapt &> /dev/null; then
              aapt dump badging app/build/outputs/apk/debug/app-debug.apk
            else
              echo "Nenhum dump tool disponível, verificando tamanho do APK"
              du -h app/build/outputs/apk/debug/app-debug.apk
            fi
          fi
