name: Build and Test APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Executar testes a cada 10 minutos
    - cron: '*/10 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: InputBridge-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Validate Shizuku in Manifest
        run: |
          echo "=== Verificando integração Shizuku no APK ==="
          MANIFEST=$(aapt2 dump xmltree --file AndroidManifest.xml app/build/outputs/apk/debug/app-debug.apk 2>/dev/null)
          checks=(
            "rikka.shizuku.ShizukuProvider:ShizukuProvider"
            "moe.shizuku.manager:queries/moe.shizuku.manager"
            "moe.shizuku.manager.permission.API_V23:API_V23 permission"
            "moe.shizuku.client.V3_SUPPORT:V3_SUPPORT"
          )
          all_ok=true
          for check in "${checks[@]}"; do
            pattern="${check%%:*}"
            label="${check##*:}"
            if echo "$MANIFEST" | grep -q "$pattern"; then
              echo "  ✓: $label"
            else
              echo "  ✗ CRÍTICO: $label"
              all_ok=false
            fi
          done
          if $all_ok; then
            echo -e "\n✅ Todas as integrações Shizuku presentes no APK!"
          else
            echo -e "\n❌ ALERTA: Integrações Shizuku AUSENTES no APK!"
            echo "   O app NÃO vai detectar o Shizuku em runtime!"
            exit 1
          fi

  # Job de teste simulado (sem dispositivo físico)
  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: InputBridge-APK
          path: app/build/outputs/apk/debug/

      - name: Check APK exists
        run: |
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "✅ APK encontrado e construído com sucesso"
            ls -la app/build/outputs/apk/debug/
          else
            echo "❌ APK não encontrado"
            exit 1
          fi

      - name: Validate APK structure
        run: |
          unzip -l app/build/outputs/apk/debug/app-debug.apk | head -20
          echo "APK size: $(du -h app/build/outputs/apk/debug/app-debug.apk | cut -f1)"
